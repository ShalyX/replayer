services:
  - type: web
    name: replayer-api
    runtime: docker
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: replayer-postgres
          property: connectionString
      - key: ADMIN_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: GENLAYER_MODE
        value: live
      - key: ALLOW_TEST_MOCKS
        value: "false"
      - key: GENLAYER_CONTRACT_ADDRESS
        value: 0xBf42bB13fb77695d42B08eCdf589Ba54eB1C361A
      - key: GENLAYER_NETWORK
        value: studionet
      - key: GENLAYER_ACCOUNT_PASSWORD
        generateValue: true
      - key: GENLAYER_ACCOUNT_NAME
        value: replayer-runtime
      - key: GENLAYER_EXPLORER_BASE_URL
        value: https://explorer-studio.genlayer.com/tx
      - key: GENLAYER_COMMAND_TIMEOUT_SECONDS
        value: "240"
      - key: GENLAYER_READ_ATTEMPTS
        value: "6"
      - key: GENLAYER_READ_INTERVAL_SECONDS
        value: "5"
      - key: GENLAYER_INDEXER_POLL_INTERVAL
        value: "15"
      - key: GENLAYER_PROOF_EVENT_ID
        value: rep_evt_appeal_final_4ecce3b57968ca52d795254e
      - key: GENLAYER_PROOF_TRANSACTION_HASH
        value: 0xc46455b2b51fecd23b4182092a7d11f9656c71ceb888c6dc6d9aa6cf84c15610
      - key: GENLAYER_PROOF_TRANSACTIONS_JSON
        value: '{"rep_evt_appeal_final_4ecce3b57968ca52d795254e":"0xc46455b2b51fecd23b4182092a7d11f9656c71ceb888c6dc6d9aa6cf84c15610"}'

databases:
  - name: replayer-postgres
    databaseName: replayer
    user: replayer
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
