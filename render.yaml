services:
  - type: web
    name: replayer-api
    runtime: docker
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: replayer-postgres
          property: connectionString
      - key: ADMIN_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: GENLAYER_MODE
        value: live
      - key: ALLOW_TEST_MOCKS
        value: "false"
      - key: GENLAYER_CONTRACT_ADDRESS
        value: 0xD1fB33f973db0F8521e44D70DD603C484283a709
      - key: GENLAYER_ACCOUNT_PASSWORD
        sync: false
      - key: GENLAYER_ACCOUNT_NAME
        value: replayer-runtime
      - key: GENLAYER_EXPLORER_BASE_URL
        value: https://explorer-studio.genlayer.com/tx
      - key: GENLAYER_COMMAND_TIMEOUT_SECONDS
        value: "240"
      - key: GENLAYER_READ_ATTEMPTS
        value: "6"
      - key: GENLAYER_READ_INTERVAL_SECONDS
        value: "5"
      - key: GENLAYER_INDEXER_POLL_INTERVAL
        value: "15"

databases:
  - name: replayer-postgres
    databaseName: replayer
    user: replayer
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
