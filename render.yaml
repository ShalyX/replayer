services:
  - type: web
    name: replayer-api
    runtime: docker
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: replayer-postgres
          property: connectionString
      - key: ADMIN_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: GENLAYER_MODE
        value: live
      - key: ALLOW_TEST_MOCKS
        value: "false"
      - key: GENLAYER_CONTRACT_ADDRESS
        value: 0x2E7017a0Ae4567b3398EC5C836913dce745F727e
      - key: GENLAYER_ACCOUNT_PASSWORD
        generateValue: true
      - key: GENLAYER_ACCOUNT_NAME
        value: replayer-runtime
      - key: GENLAYER_EXPLORER_BASE_URL
        value: https://explorer-studio.genlayer.com/tx
      - key: GENLAYER_COMMAND_TIMEOUT_SECONDS
        value: "240"
      - key: GENLAYER_READ_ATTEMPTS
        value: "6"
      - key: GENLAYER_READ_INTERVAL_SECONDS
        value: "5"
      - key: GENLAYER_INDEXER_POLL_INTERVAL
        value: "15"
      - key: GENLAYER_PROOF_EVENT_ID
        value: rep_evt_final_3ed80733353e5dfae9617a9d
      - key: GENLAYER_PROOF_TRANSACTION_HASH
        value: 0x313e028aa5fa9ab1227ca321fa9c9c33a4c3a1ecea4aee9a219ff404f4ec07a6
      - key: GENLAYER_PROOF_TRANSACTIONS_JSON
        value: '{"rep_evt_v23_probe_judgment_1783936853":"0x369f8d03207ba45626e40dd6b273c2cfad301ebfbd800d0bbd0278ba9e42a34e"}'

databases:
  - name: replayer-postgres
    databaseName: replayer
    user: replayer
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
