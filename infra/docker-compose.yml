services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: replayer
      POSTGRES_PASSWORD: replayer
      POSTGRES_DB: replayer
    ports:
      - "5432:5432"
    volumes:
      - replayer-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U replayer -d replayer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  replayer-postgres:
